
services:
  api:
    build: .
    container_name: deveda-be
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - .env
    depends_on:
      - mongo

  mongo:
    image: public.ecr.aws/docker/library/mongo:7
    container_name: deveda_db
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
